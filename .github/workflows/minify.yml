name: Minify & Commit

on:
  workflow_dispatch:

jobs:
  minify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Minify with Terser
        run: |
          npx terser epub.js \
            --compress \
              drop_console=true,\
              passes=2 \
            --mangle \
            --mangle-props \
              regex='^_[a-z]' \
            --format \
              preamble='/*! epub.js | @br1jm0h4n/epubjs | MIT */' \
            --output epubJS.min.js

      - name: Show size diff
        run: |
          ORIG=$(wc -c < epub.js)
          MINI=$(wc -c < epubJS.min.js)
          PCT=$(awk "BEGIN { printf \"%.1f\", (1 - $MINI/$ORIG) * 100 }")
          echo "epub.js     : $ORIG bytes"
          echo "epubJS.min.js: $MINI bytes"
          echo "Reduction   : $PCT%"

      - name: Commit minified file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epubJS.min.js
          git diff --staged --quiet || git commit -m "build: minify epub.js → epubJS.min.js"
          git push
